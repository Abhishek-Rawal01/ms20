<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Intro</title>
  <style>
    body{
      background:black;
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #btn{
      height:60px;
      background: rgb(0, 0, 0);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:0 0 10px white,0 0 20px rgb(234, 233, 232);
      font-size: 30px;
      gap:80px;
      color: rgb(57, 255, 20);
      text-shadow:0 0 4px whitesmoke;
      font-family: sans-serif;
      font-weight:bold;
      transition: transform 0.5s ease;
      cursor:pointer;
    }
    #btn:hover{
      transform:scale(1.25);
    }
  </style>
</head>
<body>

<button id="btn">Introducing My Teammates</button>

<!-- Background audio -->
<audio id="bgm" preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
  <source src="bgm.ogg" type="audio/ogg">
</audio>

<script>
document.getElementById("btn").onclick = () => {

    // 1️⃣ Play background music
    const bgm = document.getElementById("bgm");
    bgm.play().catch(() => {
        console.log("Audio blocked. User interaction required.");
    });

    // 2️⃣ Play voice intro
    const intro = new SpeechSynthesisUtterance("Introducing the team");
    speechSynthesis.speak(intro);

    // 3️⃣ Wait a little, then navigate (optional)
    setTimeout(() => {
        window.location.href = "img2.html";
    }, 3000); // wait 3 seconds for voice/audio
};
</script>

</body>
</html>

<!DOCTYPE html>

<title>Ultimate Team Intro</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111 0%, #000 75%);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

/* Glow */
body::before {
    content: "";
    position: absolute;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
    filter: blur(60px);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* Start screen */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: rgba(0,0,0,0.85);
}


/* Team container */
.team {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Single player reveal */
.player {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 30px;
    transform: translateX(140%);
    opacity: 0;
    animation: entry 3.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.player img {
    max-width: 450px;    /* max width allowed */
    max-height: 600px;   /* max height allowed */
    width: auto;         /* keep original aspect ratio */
    height: auto;        /* keep original aspect ratio */
    object-fit: cover;   
    border-radius: 20px;
    box-shadow: 0 0 35px rgba(255,255,255,0.4);
}

.info h1 {
    margin: 0;
    font-size: 40px;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255,255,255,0.6);
}

.info p {
    margin-top: 8px;
    font-size: 30px;
    opacity: 0.85;
    font-size: 15px;
}

/* Delays */
.p1 { animation-delay: 0s; }
.p2 { animation-delay: 3.5s; }
.p3 { animation-delay: 7s; }
.p4 { animation-delay: 10.5s; }
.p5 { animation-delay: 14s; }

/* Entry animation */
@keyframes entry {
    0% { transform: translateX(140%); opacity: 0; }
    25% { opacity: 1; }
    70% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(-120%); opacity: 0; }
}

#lineup {
    position: absolute;
    bottom: 10%;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    animation: lineupShow 2.5s ease forwards;
    animation-delay: 18s;
}

#lineup img {
    width: 140px;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(255,255,255,0.35);
}

@keyframes lineupShow {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}



</style>
</head>
